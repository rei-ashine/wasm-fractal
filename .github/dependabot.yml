version: 2
updates:
  # npm dependencies in the www directory
  - package-ecosystem: "npm"
    directory: "/www"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"

  # Cargo dependencies in the root directory
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
